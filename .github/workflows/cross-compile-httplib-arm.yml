name: Cross Compile httplib (ARM, HTTP only)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  cross-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Install Linaro GCC 4.9 cross-compiler
        run: |
          sudo mkdir -p /opt/toolchain
          cd /opt/toolchain
          wget -q \
            https://releases.linaro.org/components/toolchain/binaries/4.9-2016.02/arm-linux-gnueabihf/gcc-linaro-4.9-2016.02-x86_64_arm-linux-gnueabihf.tar.xz \
            -O linaro-toolchain.tar.xz
          tar xf linaro-toolchain.tar.xz
          echo "/opt/toolchain/gcc-linaro-4.9-2016.02-x86_64_arm-linux-gnueabihf/bin" >> $GITHUB_PATH

      - name: Verify cross-compiler
        run: |
          arm-linux-gnueabihf-g++ --version

      - name: Download cpp-httplib header-only library
        run: |
          mkdir -p build/armhf/include
          wget -q https://raw.githubusercontent.com/yhirose/cpp-httplib/v0.18.3/httplib.h \
            -O build/armhf/include/httplib.h

      - name: Cross-compile httplib as shared library (.so)
        run: |

          cat > build/httplib_compile.cpp << 'EOF'
          // Instantiate httplib templates for shared library (HTTP only, no OpenSSL)
          #include "httplib.h"

          void httplib_instantiate() {
              httplib::Client cli("http://localhost", 80);
              httplib::Server svr;
              (void)cli;
              (void)svr;
          }
          EOF

          arm-linux-gnueabihf-g++ -c \
            build/httplib_compile.cpp \
            -I build/armhf/include \
            -march=armv7-a \
            -mfpu=neon-vfpv4 \
            -mfloat-abi=hard \
            -std=c++11 \
            -pthread \
            -fPIC \
            -O2 \
            -o build/httplib_compile.o

          arm-linux-gnueabihf-g++ -shared \
            -o build/armhf/lib/libhttplib.so \
            build/httplib_compile.o \
            -pthread

          echo "=== Build artifacts ==="
          ls -lh build/armhf/include/
          ls -lh build/armhf/lib/
          file build/armhf/lib/libhttplib.so

      - name: Upload httplib artifact (headers + .so)
        uses: actions/upload-artifact@v4
        with:
          name: httplib-armhf-http-only
          path: build/armhf/
          retention-days: 30
