name: Cross Compile httplib for ARM (gnueabihf)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  # 工具链版本与目标架构
  TOOLCHAIN_NAME: gcc-linaro-4.9-2016.02-x86_64_arm-linux-gnueabihf
  TOOLCHAIN_URL: https://releases.linaro.org/components/toolchain/binaries/4.9-2016.02/arm-linux-gnueabihf/gcc-linaro-4.9-2016.02-x86_64_arm-linux-gnueabihf.tar.xz
  CROSS_PREFIX: arm-linux-gnueabihf
  # httplib (cpp-httplib) 版本
  HTTPLIB_VERSION: v0.18.0

jobs:
  cross-compile-httplib:
    name: Build httplib for arm-linux-gnueabihf
    runs-on: ubuntu-22.04

    steps:
      # ------------------------------------------------------------------ #
      # 1. 检出仓库代码
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. 安装宿主机依赖
      # ------------------------------------------------------------------ #
      - name: Install host dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            wget xz-utils cmake make \
            git ca-certificates

      # ------------------------------------------------------------------ #
      # 3. 下载并解压 Linaro 4.9 工具链（带缓存）
      # ------------------------------------------------------------------ #
      - name: Cache Linaro toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: /opt/${{ env.TOOLCHAIN_NAME }}
          key: toolchain-${{ env.TOOLCHAIN_NAME }}

      - name: Download & extract Linaro toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          echo ">>> Downloading toolchain ..."
          wget -q --show-progress -O /tmp/toolchain.tar.xz "${{ env.TOOLCHAIN_URL }}"
          echo ">>> Extracting to /opt/ ..."
          sudo tar -xf /tmp/toolchain.tar.xz -C /opt/
          rm -f /tmp/toolchain.tar.xz

      - name: Add toolchain to PATH
        run: |
          echo "/opt/${{ env.TOOLCHAIN_NAME }}/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          ${{ env.CROSS_PREFIX }}-gcc --version
          ${{ env.CROSS_PREFIX }}-g++ --version

      # ------------------------------------------------------------------ #
      # 4. 下载 cpp-httplib（header-only，顺便生成一个静态测试可执行文件）
      # ------------------------------------------------------------------ #
      - name: Download cpp-httplib
        run: |
          git clone --depth=1 --branch "${{ env.HTTPLIB_VERSION }}" \
            https://github.com/yhirose/cpp-httplib.git third_party/httplib

      # ------------------------------------------------------------------ #
      # 5. 生成 CMake 工具链文件
      # ------------------------------------------------------------------ #
      - name: Generate CMake toolchain file
        run: |
          TOOLCHAIN_BIN=/opt/${{ env.TOOLCHAIN_NAME }}/bin
          cat > arm-gnueabihf-toolchain.cmake << EOF
          # Auto-generated by GitHub Actions
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR arm)

          set(TOOLCHAIN_PREFIX ${TOOLCHAIN_BIN}/${{ env.CROSS_PREFIX }})

          set(CMAKE_C_COMPILER   \${TOOLCHAIN_PREFIX}-gcc)
          set(CMAKE_CXX_COMPILER \${TOOLCHAIN_PREFIX}-g++)
          set(CMAKE_AR           \${TOOLCHAIN_PREFIX}-ar)
          set(CMAKE_STRIP        \${TOOLCHAIN_PREFIX}-strip)

          set(CMAKE_FIND_ROOT_PATH /opt/${{ env.TOOLCHAIN_NAME }}/${{ env.CROSS_PREFIX }}/libc)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF
          echo ">>> Toolchain file content:"
          cat arm-gnueabihf-toolchain.cmake

      # ------------------------------------------------------------------ #
      # 6. 创建最小化示例源码（验证 httplib 可被交叉编译）
      # ------------------------------------------------------------------ #
      - name: Create example source
        run: |
          mkdir -p examples
          cat > examples/httplib_example.cpp << 'EOF'
          // 最小化 httplib 编译验证示例
          // 仅验证 header-only 模式可在 ARM 下编译
          #define CPPHTTPLIB_OPENSSL_SUPPORT 0
          #include "httplib.h"

          int main() {
              httplib::Server svr;
              svr.Get("/hi", [](const httplib::Request &, httplib::Response &res) {
                  res.set_content("Hello from ARM!", "text/plain");
              });
              // 仅编译验证，不实际运行服务器
              return 0;
          }
          EOF

          cat > examples/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.12)
          project(httplib_arm_example CXX)

          set(CMAKE_CXX_STANDARD 11)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)

          # httplib header-only 模式：禁用 OpenSSL / zlib 依赖
          add_definitions(
            -DCPPHTTPLIB_NO_EXCEPTIONS
          )

          add_executable(httplib_example httplib_example.cpp)

          target_include_directories(httplib_example PRIVATE
            ${CMAKE_SOURCE_DIR}/../third_party/httplib
          )

          # 静态链接 libstdc++ / libgcc，方便在 ARM 目标上独立运行
          target_link_options(httplib_example PRIVATE
            -static-libstdc++
            -static-libgcc
          )
          EOF

      # ------------------------------------------------------------------ #
      # 7. CMake 配置
      # ------------------------------------------------------------------ #
      - name: CMake configure
        run: |
          cmake -B build/arm \
            -S examples \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/arm-gnueabihf-toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_VERBOSE_MAKEFILE=ON

      # ------------------------------------------------------------------ #
      # 8. 编译
      # ------------------------------------------------------------------ #
      - name: Build
        run: |
          cmake --build build/arm --parallel $(nproc)

      # ------------------------------------------------------------------ #
      # 9. 验证输出（检查目标架构）
      # ------------------------------------------------------------------ #
      - name: Verify binary architecture
        run: |
          file build/arm/httplib_example
          ${{ env.CROSS_PREFIX }}-readelf -h build/arm/httplib_example | grep -E "Machine|Class|ABI"

      # ------------------------------------------------------------------ #
      # 10. strip（减小体积）
      # ------------------------------------------------------------------ #
      - name: Strip binary
        run: |
          ${{ env.CROSS_PREFIX }}-strip build/arm/httplib_example
          ls -lh build/arm/httplib_example

      # ------------------------------------------------------------------ #
      # 11. 上传产物
      # ------------------------------------------------------------------ #
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: httplib-arm-gnueabihf-${{ github.sha }}
          path: |
            build/arm/httplib_example
            arm-gnueabihf-toolchain.cmake
          if-no-files-found: error
          retention-days: 14
